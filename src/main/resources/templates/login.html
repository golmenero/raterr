<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Raterr</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='login')}"></header>

    <main class="main-stack">
        <section class="auth-card">
            <h1 class="auth-title">Sign in to Raterr</h1>
            
            <form th:action="@{/login}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="primary-button full-width">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a th:href="@{/register}">Sign up</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
