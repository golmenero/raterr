<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Buscar</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <span class="nav-monogram" aria-hidden="true">R</span>
        <nav class="site-nav" aria-label="Navegación principal">
            <a class="nav-link active" href="/index.html">Buscar</a>
            <a class="nav-link" href="/top.html">Tops</a>
        </nav>
    </header>

    <main class="main-stack">
        <section class="hero-card">

            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Encuentra una película y valórala en segundos.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-heading">
                <div>
                    <h2>Resultados</h2>
                </div>

                <div class="heading-filter search-inline">
                    <input id="q" type="text" placeholder="Buscar película" autocomplete="off" aria-label="Buscar película">
                    <button class="primary-button icon-button icon-only-button" type="button" onclick="buscar()" aria-label="Buscar" title="Buscar">
                        <span class="button-icon" aria-hidden="true">🔍</span>
                    </button>
                </div>
            </div>
            <div id="resultado" class="results-grid">
                <div class="empty-state">Empieza escribiendo el nombre de una película para ver resultados aquí.</div>
            </div>
        </section>
    </main>
</div>

<script>
function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function posterUrl(path) {
    return path ? 'https://image.tmdb.org/t/p/w500' + path : '';
}

function getInitials(title) {
    return (title || '?').trim().charAt(0).toUpperCase();
}

function renderResultados(movies) {
    const container = document.getElementById('resultado');

    if (!Array.isArray(movies) || movies.length === 0) {
        container.innerHTML = '<div class="empty-state">Prueba con otro título, año o nombre original.</div>';
        return;
    }

    container.innerHTML = movies.map((m) => {
        const poster = posterUrl(m.posterPath);
        const overview = m.overview && m.overview.trim().length > 0
            ? escapeHtml(m.overview)
            : 'Sin sinopsis disponible por ahora.';

        return `
            <a class="result-card-link" href="/rate.html?id=${m.tmdbId}" aria-label="Valorar ${escapeHtml(m.title)}">
                <article class="result-card">
                    <div class="poster-frame">
                        ${poster
                            ? `<img src="${poster}" alt="Póster de ${escapeHtml(m.title)}">`
                            : `<div class="poster-fallback">${escapeHtml(getInitials(m.title))}</div>`}
                    </div>
                    <div class="result-content">
                        <div class="tag-row">
                            <span class="tag">${m.releaseYear || 'Año desconocido'}</span>
                            <span class="tag">Media ${m.averageScore || 0}</span>
                        </div>
                        <h3 class="result-title">${escapeHtml(m.title)}</h3>
                        <p class="result-overview">${overview}</p>
                    </div>
                </article>
            </a>
        `;
    }).join('');
}

async function buscar() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;

    try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        if (!res.ok) {
            document.getElementById('resultado').innerHTML = '<div class="empty-state">No se pudo completar la búsqueda.</div>';
            return;
        }

        const movies = await res.json();
        renderResultados(movies);
    } catch (_) {
        document.getElementById('resultado').innerHTML = '<div class="empty-state">Se perdió la conexión al buscar resultados.</div>';
    }
}

document.getElementById('q').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') buscar();
});
</script>
</body>
</html>
