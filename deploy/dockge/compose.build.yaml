services:
  raterr:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: raterr:local
    container_name: raterr
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/data/raterr.db}
      TMDB_API_KEY: ${TMDB_API_KEY}
    volumes:
      - ${RATERR_DATA_DIR:-/mnt/tank/apps/raterr/data}:/data

