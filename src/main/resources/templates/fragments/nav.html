<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="nav(active)">
    <div class="nav-brand">
        <span class="nav-monogram" aria-hidden="true">R</span>
    </div>
    <nav class="nav-links" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
        <a class="nav-link" th:classappend="${active == 'search'} ? ' active'" href="/search">Search</a>
        <a class="nav-link" href="/movie/top">Movies</a>
        <a class="nav-link" href="/tv/top">TV Shows</a>
    </nav>
    <div class="nav-auth" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="nav-link logout-button" aria-label="Logout">
                <i data-lucide="log-out" aria-hidden="true"></i>
            </button>
        </form>
    </div>
</header>
</body>
</html>
