<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - TV Shows Tops</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='tv-top')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Review your best TV shows at a glance.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-heading">
                <div class="heading-filter">
                    <form th:action="@{/tv/top}" method="get" style="display: contents;">
                        <select id="category" name="category" aria-label="Filter by category">
                            <option value="">All categories</option>
                            <option value="Action" th:selected="${selectedCategory == 'Action'}">Action</option>
                            <option value="Adventure" th:selected="${selectedCategory == 'Adventure'}">Adventure</option>
                            <option value="Animation" th:selected="${selectedCategory == 'Animation'}">Animation</option>
                            <option value="Comedy" th:selected="${selectedCategory == 'Comedy'}">Comedy</option>
                            <option value="Crime" th:selected="${selectedCategory == 'Crime'}">Crime</option>
                            <option value="Documentary" th:selected="${selectedCategory == 'Documentary'}">Documentary</option>
                            <option value="Drama" th:selected="${selectedCategory == 'Drama'}">Drama</option>
                            <option value="Family" th:selected="${selectedCategory == 'Family'}">Family</option>
                            <option value="Fantasy" th:selected="${selectedCategory == 'Fantasy'}">Fantasy</option>
                            <option value="History" th:selected="${selectedCategory == 'History'}">History</option>
                            <option value="Horror" th:selected="${selectedCategory == 'Horror'}">Horror</option>
                            <option value="Mystery" th:selected="${selectedCategory == 'Mystery'}">Mystery</option>
                            <option value="Romance" th:selected="${selectedCategory == 'Romance'}">Romance</option>
                            <option value="Science Fiction" th:selected="${selectedCategory == 'Science Fiction'}">Science Fiction</option>
                            <option value="Sci-Fi &amp; Fantasy" th:selected="${selectedCategory == 'Sci-Fi &amp; Fantasy'}">Sci-Fi &amp; Fantasy</option>
                            <option value="Soap" th:selected="${selectedCategory == 'Soap'}">Soap</option>
                            <option value="Talk" th:selected="${selectedCategory == 'Talk'}">Talk</option>
                            <option value="Thriller" th:selected="${selectedCategory == 'Thriller'}">Thriller</option>
                            <option value="War" th:selected="${selectedCategory == 'War'}">War</option>
                            <option value="War &amp; Politics" th:selected="${selectedCategory == 'War &amp; Politics'}">War &amp; Politics</option>
                            <option value="Western" th:selected="${selectedCategory == 'Western'}">Western</option>
                        </select>
                        <input id="year" name="year" type="number" min="1900" max="2100" th:value="${selectedYear}" placeholder="Year" aria-label="Filter by year">
                        <button class="primary-button icon-button icon-only-button" type="submit" aria-label="Refresh ranking">
                            <span class="button-icon" aria-hidden="true">&#8635;</span>
                        </button>
                    </form>
                </div>
            </div>

            <div th:if="${error}" id="msg" class="feedback error spacer-top" th:text="${error}"></div>
            <div th:if="${success}" id="msg" class="feedback success spacer-top" th:text="${success}"></div>
            
            <div th:if="${tops != null}" id="list" class="top-list spacer-top">
                <div th:if="${#lists.isEmpty(tops)}" class="empty-state">No rated TV shows yet for this filter.</div>
                <article th:each="s, iterStat : ${tops}" th:class="'top-card list-poster-card' + (${iterStat.index < 3 and s.posterPath != null} ? '' : ' no-poster')">
                    <div th:if="${iterStat.index < 3 and s.posterPath != null}" class="top-poster poster-frame">
                        <img th:src="@{'https://image.tmdb.org/t/p/w185' + ${s.posterPath}}" th:alt="'Poster of ' + ${s.name}">
                    </div>
                    <div class="top-info">
                        <div class="tag-row top-tag-row">
                            <span class="tag" th:text="'#' + ${iterStat.index + 1}">#1</span>
                            <span class="tag" th:text="${s.firstAirYear != null} ? ${s.firstAirYear} : 'Unknown year'">Year</span>
                        </div>
                        <h3 class="top-title" th:text="${s.name}">Title</h3>
                        <p class="rating-inline compact-stars">
                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                <span th:if="${s.averageScore >= i * 2}">&#9733;</span>
                                <span th:unless="${s.averageScore >= i * 2}">&#9734;</span>
                            </span>
                            <span class="score-value" th:text="${#strings.replace(#numbers.formatDecimal(s.averageScore, 1, 2), ',', '.')}">0.0</span>
                        </p>
                        <div class="category-ratings">
                            <div class="category-rating">
                                <span class="category-label"><i data-lucide="clapperboard" class="category-icon"></i></span>
                                <span class="category-score" th:text="${#strings.replace(#numbers.formatDecimal(s.directing, 1, 2), ',', '.')}">0.0</span>
                            </div>
                            <div class="category-rating">
                                <span class="category-label"><i data-lucide="camera" class="category-icon"></i></span>
                                <span class="category-score" th:text="${#strings.replace(#numbers.formatDecimal(s.cinematography, 1, 2), ',', '.')}">0.0</span>
                            </div>
                            <div class="category-rating">
                                <span class="category-label"><i data-lucide="hat-glasses" class="category-icon"></i></span>
                                <span class="category-score" th:text="${#strings.replace(#numbers.formatDecimal(s.acting, 1, 2), ',', '.')}">0.0</span>
                            </div>
                            <div class="category-rating">
                                <span class="category-label"><i data-lucide="music" class="category-icon"></i></span>
                                <span class="category-score" th:text="${#strings.replace(#numbers.formatDecimal(s.soundtrack, 1, 2), ',', '.')}">0.0</span>
                            </div>
                            <div class="category-rating">
                                <span class="category-label"><i data-lucide="file-text" class="category-icon"></i></span>
                                <span class="category-score" th:text="${#strings.replace(#numbers.formatDecimal(s.screenplay, 1, 2), ',', '.')}">0.0</span>
                            </div>
                        </div>
                    </div>
                    <div class="top-actions">
                        <form th:action="@{'/tv/top/delete/' + ${s.tmdbId}}" method="post">
                            <button class="top-delete-button" type="submit" aria-label="Delete rating">
                                <i data-lucide="trash-2" aria-hidden="true"></i>
                            </button>
                        </form>
                    </div>
                </article>
            </div>
            <div th:unless="${tops != null}" id="list" class="top-list spacer-top"></div>
        </section>
    </main>
</div>
</body>
<script>
    lucide.createIcons();
    
    document.querySelectorAll('.top-card').forEach(card => {
        card.addEventListener('mouseenter', () => {
            lucide.createIcons();
        });
    });
</script>
</html>
