<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Rate</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='rate')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title" id="title">Loading movie...</h1>
                </div>
            </div>
        </section>

        <article class="movie-inline-bar" id="movieSummary">
            <div class="poster-frame movie-inline-poster">
                <div class="poster-fallback">?</div>
            </div>
            <div class="movie-inline-body">
                <div class="tag-row" id="movieTags">
                    <span class="tag">Loading...</span>
                </div>
                <p class="movie-inline-overview muted" id="movieOverview">Loading movie information.</p>
            </div>
        </article>

        <section class="panel score-panel">
            <div class="scores-grid">
                <div class="score-field">
                    <label class="score-label" for="directing"><span><span class="score-icon" aria-hidden="true">🎬</span>Direction</span><span class="score-value" id="directingValue">5.00</span></label>
                    <input id="directing" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="cinematography"><span><span class="score-icon" aria-hidden="true">📷</span>Photography</span><span class="score-value" id="cinematographyValue">5.00</span></label>
                    <input id="cinematography" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="acting"><span><span class="score-icon" aria-hidden="true">🎭</span>Acting</span><span class="score-value" id="actingValue">5.00</span></label>
                    <input id="acting" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="soundtrack"><span><span class="score-icon" aria-hidden="true">🎵</span>Soundtrack</span><span class="score-value" id="soundtrackValue">5.00</span></label>
                    <input id="soundtrack" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="screenplay"><span><span class="score-icon" aria-hidden="true">✍️</span>Script</span><span class="score-value" id="screenplayValue">5.00</span></label>
                    <input id="screenplay" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>
            </div>

            <div class="top-actions">
                <button id="btnSave" class="primary-button" type="button" onclick="save()">Save</button>
            </div>
        </section>

        <div id="msg" class="feedback hidden"></div>
    </main>
</div>

<script type="module" src="/js/rate.js"></script>
</body>
</html>
