<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Search</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='search')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Find a movie and rate it in seconds.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="search-toolbar-centered">
                <div class="heading-filter search-inline">
                    <input id="q" type="text" placeholder="Search movie" autocomplete="off" aria-label="Search movie">
                    <button class="primary-button icon-button icon-only-button" type="button" onclick="search()" aria-label="Search" title="Search">
                        <span class="button-icon" aria-hidden="true">
                            <svg class="button-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <circle cx="11" cy="11" r="6.5"></circle>
                                <line x1="16" y1="16" x2="21" y2="21"></line>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
            <div id="results" class="results-grid"></div>
        </section>
    </main>
</div>

<script type="module" src="/js/search.js"></script>
</body>
</html>
