<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Rate TV Show</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/lucide.min.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='tv-rate')}"></header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title" id="title" th:text="${show != null} ? ${show.name} : 'TV show not found'">Loading TV show...</h1>
                </div>
            </div>
        </section>

        <article th:if="${show != null}" class="movie-inline-bar" id="showSummary">
            <div class="poster-frame movie-inline-poster">
                <img th:if="${show.posterPath != null}" th:src="@{'https://image.tmdb.org/t/p/w185' + ${show.posterPath}}" th:alt="'Poster of ' + ${show.name}">
                <div th:unless="${show.posterPath != null}" class="poster-fallback" th:text="${#strings.toUpperCase(#strings.substring(show.name, 0, 1))}">?</div>
            </div>
            <div class="movie-inline-body">
                <div class="tag-row" id="showTags">
                    <span class="tag" th:text="${show.firstAirYear != null} ? ${show.firstAirYear} : 'Unknown year'">Year</span>
                    <span class="tag">TMDB: <span th:text="${show.tmdbVoteAverage != null} ? ${show.tmdbVoteAverage} : '&#8212;'">0</span></span>
                </div>
                <p class="movie-inline-overview muted" id="showOverview" th:text="${show.overview != null and show.overview.trim().length() > 0} ? ${show.overview} : 'No synopsis available for this title.'">Loading TV show information.</p>
            </div>
        </article>

        <section th:if="${show != null and !alreadyRated}" class="panel score-panel">
            <form th:action="@{/tv/rate}" method="post" class="scores-grid">
                <input type="hidden" name="tmdbId" th:value="${show.tmdbId}">
                
                <div class="score-field">
                    <label class="score-label" for="directing">
                        <span><i data-lucide="clapperboard" class="score-icon"></i>Direction</span>
                        <span class="score-value" id="directingValue">5.00</span>
                    </label>
                    <input id="directing" name="directing" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('directingValue').textContent = parseFloat(this.value).toFixed(2)">
                </div>

                <div class="score-field">
                    <label class="score-label" for="cinematography">
                        <span><i data-lucide="camera" class="score-icon"></i>Photography</span>
                        <span class="score-value" id="cinematographyValue">5.00</span>
                    </label>
                    <input id="cinematography" name="cinematography" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('cinematographyValue').textContent = parseFloat(this.value).toFixed(2)">
                </div>

                <div class="score-field">
                    <label class="score-label" for="acting">
                        <span><i data-lucide="hat-glasses" class="score-icon"></i>Acting</span>
                        <span class="score-value" id="actingValue">5.00</span>
                    </label>
                    <input id="acting" name="acting" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('actingValue').textContent = parseFloat(this.value).toFixed(2)">
                </div>

                <div class="score-field">
                    <label class="score-label" for="soundtrack">
                        <span><i data-lucide="music" class="score-icon"></i>Soundtrack</span>
                        <span class="score-value" id="soundtrackValue">5.00</span>
                    </label>
                    <input id="soundtrack" name="soundtrack" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('soundtrackValue').textContent = parseFloat(this.value).toFixed(2)">
                </div>

                <div class="score-field">
                    <label class="score-label" for="screenplay">
                        <span><i data-lucide="file-text" class="score-icon"></i>Script</span>
                        <span class="score-value" id="screenplayValue">5.00</span>
                    </label>
                    <input id="screenplay" name="screenplay" type="range" min="1" max="10" step="0.25" value="5" oninput="document.getElementById('screenplayValue').textContent = parseFloat(this.value).toFixed(2)">
                </div>

                <div class="top-actions">
                    <button id="btnSave" class="primary-button" type="submit">Save</button>
                </div>
            </form>
        </section>

        <div th:if="${alreadyRated}" class="panel score-panel">
            <p class="movie-inline-overview muted">This TV show already has a rating. If you want to change it, delete it first from Tops.</p>
        </div>

        <div th:if="${error}" id="msg" class="feedback error" th:text="${error}"></div>
        <div th:if="${success}" id="msg" class="feedback success" th:text="${success}"></div>
    </main>
</div>
</body>
<script>
    lucide.createIcons();
</script>
</html>
