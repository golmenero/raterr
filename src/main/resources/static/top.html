<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Tops</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <a class="nav-link" href="/index.html">Search</a>
        <span class="nav-monogram" aria-hidden="true">R</span>
        <a class="nav-link active" href="/top.html">Tops</a>
    </header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Review your best movies at a glance.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-heading">

                <div class="heading-filter">
                    <input id="year" type="number" min="1900" max="2100" placeholder="Year" aria-label="Filter by year">
                    <button class="primary-button icon-button icon-only-button" type="button" onclick="cargarTops()" aria-label="Refresh ranking">
                        <span class="button-icon" aria-hidden="true">↻</span>
                    </button>
                </div>
            </div>

            <div id="msg" class="feedback hidden spacer-top"></div>
            <div id="lista" class="top-list spacer-top"></div>
        </section>
    </main>
</div>

<script>
function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function setMessage(text, type) {
    const box = document.getElementById('msg');
    box.textContent = text;
    box.className = 'feedback ' + type + ' spacer-top';
}

function posterUrl(path) {
    return path ? 'https://image.tmdb.org/t/p/w500' + path : '';
}

function ratingStars(score) {
    const safeScore = Number(score || 0);
    const filled = Math.max(0, Math.min(5, Math.round(safeScore / 2)));
    return `
        <span class="stars" aria-hidden="true">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}</span>
        <span>${safeScore.toFixed(2)}</span>
    `;
}


function renderListCard(movie, index) {
    const poster = posterUrl(movie.posterPath);
    const showPoster = index < 3 && Boolean(poster);
    return `
        <article class="top-card list-poster-card ${showPoster ? '' : 'no-poster'}">
            ${showPoster
                ? `<div class="top-poster poster-frame"><img src="${poster}" alt="Poster of ${escapeHtml(movie.title)}"></div>`
                : ''}
            <div class="top-info">
                <div class="tag-row top-tag-row">
                    <span class="tag">#${index + 1}</span>
                    <span class="tag">${movie.releaseYear || 'Unknown year'}</span>
                </div>
                <h3 class="top-title">${escapeHtml(movie.title)}</h3>
                <p class="rating-inline compact-stars">${ratingStars(movie.averageScore)}</p>
            </div>
            <div class="top-actions">
                <button class="top-delete-button" type="button" onclick="eliminarValoracion(${movie.tmdbId}, '${encodeURIComponent(String(movie.title))}')" aria-label="Delete rating">
                    <span class="button-icon" aria-hidden="true">🗑</span>
                </button>
            </div>
        </article>
    `;
}

async function cargarTops() {
    const year = document.getElementById('year').value;
    const list = document.getElementById('lista');

    let url = '/api/tops';
    if (year) url += '?year=' + year;

    try {
        const res = await fetch(url);
        if (!res.ok) {
            list.innerHTML = '<div class="empty-state">Could not load the tops.</div>';
            return;
        }

        const tops = await res.json();

        if (!Array.isArray(tops) || tops.length === 0) {
            list.innerHTML = '<div class="empty-state">No rated movies yet for this filter.</div>';
        } else {
            list.innerHTML = tops.map((m, index) => renderListCard(m, index)).join('');
        }
    } catch (_) {
        list.innerHTML = '<div class="empty-state">Connection lost while loading the ranking.</div>';
    }
}

async function eliminarValoracion(tmdbId, titleEncoded) {
    const title = decodeURIComponent(titleEncoded);
    const confirmacion = window.confirm('Delete the rating for "' + title + '"?');
    if (!confirmacion) return;

    try {
        const res = await fetch('/api/movie/' + tmdbId + '/rating', {
            method: 'DELETE'
        });

        if (!res.ok) {
            setMessage('Could not delete the rating.', 'error');
            return;
        }

        setMessage('Rating deleted successfully.', 'success');
        await cargarTops();
    } catch (_) {
        setMessage('Network error while trying to delete.', 'error');
    }
}

cargarTops();
</script>
</body>
</html>
