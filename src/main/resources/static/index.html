<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Search</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <a class="nav-link active" href="/index.html">Search</a>
        <span class="nav-monogram" aria-hidden="true">R</span>
        <a class="nav-link" href="/top.html">Tops</a>
    </header>

    <main class="main-stack">
        <section class="hero-card">

            <div class="hero-content">
                <div>
                    <h1 class="hero-title">Find a movie and rate it in seconds.</h1>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="search-toolbar-centered">
                <div class="heading-filter search-inline">
                    <input id="q" type="text" placeholder="Search movie" autocomplete="off" aria-label="Search movie">
                    <button class="primary-button icon-button icon-only-button" type="button" onclick="buscar()" aria-label="Search" title="Search">
                        <span class="button-icon" aria-hidden="true">
                            <svg class="button-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <circle cx="11" cy="11" r="6.5"></circle>
                                <line x1="16" y1="16" x2="21" y2="21"></line>
                            </svg>
                        </span>
                    </button>
                </div>
            </div>
            <div id="resultado" class="results-grid"></div>
        </section>
    </main>
</div>

<script>
function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function posterUrl(path) {
    return path ? 'https://image.tmdb.org/t/p/w500' + path : '';
}

function getInitials(title) {
    return (title || '?').trim().charAt(0).toUpperCase();
}

function ratingStars(score) {
    const safeScore = Number(score || 0);
    const filled = Math.max(0, Math.min(5, Math.round(safeScore / 2)));
    return `<span class="stars" aria-hidden="true">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}</span>`;
}

function renderResultados(movies) {
    const container = document.getElementById('resultado');

    if (!Array.isArray(movies) || movies.length === 0) {
        container.innerHTML = '<div class="empty-state">Try with another title, year or original name.</div>';
        return;
    }

    container.innerHTML = movies.map((m) => {
        const poster = posterUrl(m.posterPath);
        const overview = m.overview && m.overview.trim().length > 0
            ? escapeHtml(m.overview)
            : 'No synopsis available right now.';
        const isRated = (m.ratingsCount || 0) > 0;

        const cardContent = `
            <article class="result-card ${isRated ? 'result-card-disabled' : ''}">
                <div class="poster-frame">
                    ${poster
                        ? `<img src="${poster}" alt="Poster of ${escapeHtml(m.title)}">`
                        : `<div class="poster-fallback">${escapeHtml(getInitials(m.title))}</div>`}
                </div>
                <div class="result-content">
                    <div class="tag-row result-meta-row">
                        <span class="tag">${m.releaseYear || 'Unknown year'}</span>
                        ${isRated ? `<span class="result-rating-inline">${ratingStars(m.averageScore)}</span>` : ''}
                    </div>
                    <h3 class="result-title">${escapeHtml(m.title)}</h3>
                    <p class="result-overview">${overview}</p>
                </div>
            </article>
        `;

        if (isRated) {
            return cardContent;
        }

        return `
            <a class="result-card-link" href="/rate.html?id=${m.tmdbId}" aria-label="Rate ${escapeHtml(m.title)}">
                ${cardContent}
            </a>
        `;
    }).join('');
}

async function buscar() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;

    try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        if (!res.ok) {
            document.getElementById('resultado').innerHTML = '<div class="empty-state">Could not complete the search.</div>';
            return;
        }

        const movies = await res.json();
        renderResultados(movies);
    } catch (_) {
        document.getElementById('resultado').innerHTML = '<div class="empty-state">Connection lost while searching for results.</div>';
    }
}

document.getElementById('q').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') buscar();
});
</script>
</body>
</html>
