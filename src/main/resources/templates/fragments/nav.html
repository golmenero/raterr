<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="nav(active)">
    <div class="nav-left">
        <div class="nav-toggle-group" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
            <a class="nav-link nav-toggle-main" th:classappend="${active == 'search'} ? 'active'" href="/search">
                <span class="nav-toggle-movies">Search</span>
            </a>
            <a class="nav-link nav-toggle-hidden-link" href="/movie">Movies</a>
            <a class="nav-link nav-toggle-hidden-link" href="/movie/top">Movie Tops</a>
            <a class="nav-link nav-toggle-hidden-link" href="/tv">TV Shows</a>
            <a class="nav-link nav-toggle-hidden-link" href="/tv/top">TV Tops</a>
        </div>
    </div>
    <div class="nav-center">
        <span class="nav-monogram" aria-hidden="true">R</span>
    </div>
    <div class="nav-right">
        <div th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}" class="nav-auth">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link logout-button" aria-label="Logout">
                    <i data-lucide="log-out" aria-hidden="true"></i>
                </button>
            </form>
        </div>
    </div>
</header>
</body>
</html>
