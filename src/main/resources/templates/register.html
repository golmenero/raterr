<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Raterr</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header" th:replace="~{fragments/nav :: nav(active='register')}"></header>

    <main class="main-stack">
        <section class="auth-card">
            <h1 class="auth-title">Create your account</h1>

            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="50">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="8">
                </div>

                <button type="submit" class="primary-button full-width">Create Account</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a th:href="@{/login}">Sign in</a>
            </p>
        </section>
    </main>
</div>
</body>
</html>
