<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="nav(active)">
    <a th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}" 
       class="nav-link" th:classappend="${active == 'search'} ? 'active'" href="/">Search</a>
    <span class="nav-monogram" aria-hidden="true" th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">R</span>
    <a th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}" 
       class="nav-link" th:classappend="${active == 'top'} ? 'active'" href="/top">Tops</a>
    
    <div th:if="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}" class="nav-auth">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="nav-link logout-button" aria-label="Logout">
                <svg class="button-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="width: 20px; height: 20px;">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    <polyline points="16 17 21 12 16 7" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></line>
                </svg>
            </button>
        </form>
    </div>
    
    <a th:unless="${#authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}" 
       class="nav-monogram nav-monogram-link" aria-hidden="true" href="/login">R</a>
</header>
</body>
</html>
