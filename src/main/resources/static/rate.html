<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raterr - Valorar</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <a class="nav-link" href="/index.html">Buscar</a>
        <span class="nav-monogram" aria-hidden="true">R</span>
        <a class="nav-link" href="/top.html">Tops</a>
    </header>

    <main class="main-stack">
        <section class="hero-card">
            <div class="hero-content">
                <div>
                    <h1 class="hero-title" id="title">Cargando película...</h1>
                </div>
            </div>
        </section>

        <article class="movie-inline-bar" id="movieSummary">
            <div class="poster-frame movie-inline-poster">
                <div class="poster-fallback">?</div>
            </div>
            <div class="movie-inline-body">
                <div class="tag-row" id="movieTags">
                    <span class="tag">Cargando...</span>
                </div>
                <p class="movie-inline-overview muted" id="movieOverview">Cargando información de la película.</p>
            </div>
        </article>

        <section class="panel score-panel">

            <div class="scores-grid">
                <div class="score-field">
                    <label class="score-label" for="dir"><span><span class="score-icon" aria-hidden="true">🎬</span>Dirección</span><span class="score-value" id="dirValue">5.00</span></label>
                    <input id="dir" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="foto"><span><span class="score-icon" aria-hidden="true">📷</span>Fotografía</span><span class="score-value" id="fotoValue">5.00</span></label>
                    <input id="foto" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="act"><span><span class="score-icon" aria-hidden="true">🎭</span>Actuación</span><span class="score-value" id="actValue">5.00</span></label>
                    <input id="act" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="banda"><span><span class="score-icon" aria-hidden="true">🎵</span>Banda sonora</span><span class="score-value" id="bandaValue">5.00</span></label>
                    <input id="banda" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>

                <div class="score-field">
                    <label class="score-label" for="guion"><span><span class="score-icon" aria-hidden="true">✍️</span>Guión</span><span class="score-value" id="guionValue">5.00</span></label>
                    <input id="guion" type="range" min="1" max="10" step="0.25" value="5">
                    <div class="range-meta"><span>1</span><span>10</span></div>
                </div>
            </div>

            <div class="top-actions">
                <button id="btnGuardar" class="primary-button" type="button" onclick="guardar()">Guardar</button>
            </div>
        </section>

        <div id="msg" class="feedback hidden"></div>
    </main>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

const sliderIds = ['dir', 'foto', 'act', 'banda', 'guion'];

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function posterUrl(path) {
    return path ? 'https://image.tmdb.org/t/p/w185' + path : '';
}

function setMessage(text, type) {
    const box = document.getElementById('msg');
    box.textContent = text;
    box.className = 'feedback ' + type;
}

function updateSliderValue(inputId) {
    const input = document.getElementById(inputId);
    const value = document.getElementById(inputId + 'Value');
    value.textContent = parseFloat(input.value).toFixed(2);
}

function setInputsDisabled(disabled) {
    sliderIds.forEach((inputId) => {
        document.getElementById(inputId).disabled = disabled;
    });
    document.getElementById('btnGuardar').disabled = disabled;
}

function renderMovieSummary(movie) {
    const container = document.getElementById('movieSummary');
    const poster = posterUrl(movie.posterPath);
    const overview = movie.overview && movie.overview.trim().length > 0
        ? escapeHtml(movie.overview)
        : 'No hay sinopsis disponible para este título.';

    container.innerHTML = `
        <div class="poster-frame movie-inline-poster">
            ${poster
                ? `<img src="${poster}" alt="Póster de ${escapeHtml(movie.title)}">`
                : `<div class="poster-fallback">${escapeHtml((movie.title || '?').charAt(0).toUpperCase())}</div>`}
        </div>
        <div class="movie-inline-body">
            <div class="tag-row">
                <span class="tag">${movie.releaseYear || 'Año desconocido'}</span>
                <span class="tag">TMDB: ${movie.tmdbVoteAverage || '—'}</span>
            </div>
            <p class="movie-inline-overview muted">${overview}</p>
        </div>
    `;
}

sliderIds.forEach((inputId) => {
    document.getElementById(inputId).addEventListener('input', () => updateSliderValue(inputId));
    updateSliderValue(inputId);
});

if (!id) {
    setMessage('Falta ID de película.', 'error');
    setInputsDisabled(true);
} else {
    cargarPelicula();
}

async function cargarPelicula() {
    try {
        const res = await fetch('/api/movie/' + id);
        if (!res.ok) {
            setMessage('No encontramos esa película.', 'error');
            setInputsDisabled(true);
            return;
        }

        const m = await res.json();
        document.getElementById('title').textContent = m.title;
        renderMovieSummary(m);

        if ((m.ratingsCount || 0) > 0) {
            setInputsDisabled(true);
            setMessage('Esta película ya tiene una valoración. Si quieres cambiarla, elimínala antes desde Tops.', 'info');
        } else {
            setInputsDisabled(false);
            document.getElementById('msg').className = 'feedback hidden';
        }
    } catch (_) {
        setMessage('No se pudo cargar la película por un error de red.', 'error');
        setInputsDisabled(true);
    }
}

async function guardar() {
    const payload = {
        tmdbId: parseInt(id),
        direccion: parseFloat(document.getElementById('dir').value),
        fotografia: parseFloat(document.getElementById('foto').value),
        actuacion: parseFloat(document.getElementById('act').value),
        bandaSonora: parseFloat(document.getElementById('banda').value),
        guion: parseFloat(document.getElementById('guion').value)
    };

    try {
        const res = await fetch('/api/rate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            const data = await res.json();
            setMessage('Valoración guardada. Nueva media: ' + data.averageScore.toFixed(2), 'success');
            setInputsDisabled(true);
            window.location.href = '/top.html';
        } else if (res.status === 409) {
            const err = await res.json();
            setMessage(err.message || 'Ya existe una valoración para esta película.', 'info');
            setInputsDisabled(true);
        } else {
            setMessage('No se pudo guardar la valoración.', 'error');
        }
    } catch (_) {
        setMessage('Se produjo un error de red al guardar.', 'error');
    }
}
</script>
</body>
</html>
